document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

older-val=\"{{ false }}\"><div style=\"{{ ghostStyle }}\"><div style=\"{{ ghostBody }}\"><\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n\n  <!-- step chip -->\n  <div style=\"position:absolute; left:16px; top:14px; z-index:4; font:600 10px 'IBM Plex Mono',monospace; color:#ffb454; background:rgba(7,11,18,.85); border:1px solid rgba(255,180,84,.4); padding:5px 11px; border-radius:3px\">{{ hint }}<\u002Fdiv>\n  <div style=\"position:absolute; right:16px; top:14px; z-index:1; font:400 9.5px 'IBM Plex Mono',monospace; color:#3a4a5e\">CLICK ANY SHIP TO INSPECT ▸<\u002Fdiv>\n\n  <!-- hover firing solution tooltip -->\n  <sc-if value=\"{{ tip }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"{{ tipStyle }}\">\n      <div style=\"color:#ffb454; font-weight:600; margin-bottom:5px\">{{ tip.title }}<\u002Fdiv>\n      <div style=\"color:#8ba0b8\">{{ tip.l1 }}<\u002Fdiv>\n      <div style=\"color:#8ba0b8\">{{ tip.l2 }}<\u002Fdiv>\n      <div style=\"color:#ff6159; margin-top:3px\">{{ tip.l3 }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- inspect overlay -->\n  <sc-if value=\"{{ ins }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; right:0; top:0; bottom:0; width:290px; background:rgba(8,13,21,.96); border-left:1px solid rgba(120,180,220,.3); padding:16px 18px; z-index:5; box-shadow:-12px 0 40px rgba(0,0,0,.5); cursor:default\" onclick=\"{{ stopClick }}\">\n      <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:4px\">\n        <span style=\"{{ ins.nameStyle }}\">{{ ins.name }}<\u002Fspan>\n        <span style=\"font:600 13px 'IBM Plex Mono',monospace; color:#5c7089; cursor:pointer; padding:2px 6px\" onclick=\"{{ closeInspect }}\">✕<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font:500 9.5px 'IBM Plex Mono',monospace; color:#5c7089; margin-bottom:12px\">{{ ins.sub }}<\u002Fdiv>\n      <div style=\"position:relative; height:104px; margin-bottom:12px; background:#0a111c; border:1px solid rgba(120,180,220,.12); border-radius:4px\">\n        <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center\"><div style=\"{{ ins.shipStyle }}\"><\u002Fdiv><\u002Fdiv>\n        <sc-for list=\"{{ ins.shieldArcs }}\" as=\"sa\" hint-placeholder-count=\"0\"><div style=\"{{ sa.style }}\"><\u002Fdiv><\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:10px; align-items:center; margin-bottom:8px; font:500 9.5px 'IBM Plex Mono',monospace; color:#8ba0b8\">\n        <span>HULL<\u002Fspan>\n        <div style=\"flex:1; height:7px; background:#101a28; border:1px solid rgba(120,180,220,.2); border-radius:2px; overflow:hidden\"><div style=\"{{ ins.hullBar }}\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"color:#cfdcea\">{{ ins.hullText }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font:500 9.5px 'IBM Plex Mono',monospace; color:#8ba0b8; margin-bottom:14px\">SHIELDS <span style=\"color:#cfdcea\">{{ ins.shieldsText }}<\u002Fspan><\u002Fdiv>\n      <div style=\"font:700 11px Rajdhani,sans-serif; letter-spacing:2px; color:#8ba0b8; margin-bottom:8px\">INTERNAL SYSTEMS<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:6px; font:500 9.5px 'IBM Plex Mono',monospace; margin-bottom:14px\">\n        <sc-for list=\"{{ ins.systems }}\" as=\"sy\" hint-placeholder-count=\"4\">\n          <div style=\"{{ sy.rowStyle }}\"><span style=\"color:#cfdcea\">{{ sy.label }}<\u002Fspan><span style=\"{{ sy.stateStyle }}\">{{ sy.state }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- banner -->\n  <sc-if value=\"{{ banner }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; inset:0; z-index:10; background:rgba(4,7,12,.8); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px\">\n      <div style=\"{{ banner.style }}\">{{ banner.text }}<\u002Fdiv>\n      <div style=\"font:400 11px 'IBM Plex Mono',monospace; color:#8ba0b8\">{{ banner.sub }}<\u002Fdiv>\n      <div style=\"padding:12px 32px; background:linear-gradient(180deg,#1a5f6d,#0e3d47); border:1px solid #4cd7ea; border-radius:4px; font:700 14px Rajdhani,sans-serif; letter-spacing:3px; color:#d8f6fb; box-shadow:0 0 24px rgba(76,215,234,.35); cursor:pointer\" onclick=\"{{ restart }}\">RESTART ▸<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<!-- MOVE strip -->\n<sc-if value=\"{{ isMove }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex; gap:10px; padding:14px 20px; border-top:1px solid rgba(120,180,220,.15); background:#0a1018; align-items:center\">\n  <div style=\"font:700 12px Rajdhani,sans-serif; letter-spacing:2px; color:#8ba0b8\">HELM<\u002Fdiv>\n  <sc-for list=\"{{ orderCards }}\" as=\"o\" hint-placeholder-count=\"5\">\n    <div style=\"{{ o.style }}\" onclick=\"{{ o.click }}\">\n      <div style=\"{{ o.nameStyle }}\">{{ o.name }}<\u002Fdiv>\n      <div style=\"font:400 9px/1.5 'IBM Plex Mono',monospace; color:#8ba0b8; margin-top:2px\">{{ o.desc }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n  <div style=\"flex:1\"><\u002Fdiv>\n  <div style=\"{{ lockBtnStyle }}\" onclick=\"{{ lockMove }}\">LOCK MOVE ▸<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- FIRE strip -->\n<sc-if value=\"{{ isFire }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex; gap:10px; padding:14px 20px; border-top:1px solid rgba(120,180,220,.15); background:#0a1018; align-items:center\">\n  <div style=\"font:700 12px Rajdhani,sans-serif; letter-spacing:2px; color:#8ba0b8\">WEAPONS<\u002Fdiv>\n  <sc-for list=\"{{ weaponCards }}\" as=\"w\" hint-placeholder-count=\"3\">\n    <div style=\"{{ w.style }}\" onclick=\"{{ w.click }}\">\n      <div style=\"{{ w.nameStyle }}\">{{ w.name }}<\u002Fdiv>\n      <div style=\"{{ w.subStyle }}\">{{ w.sub }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n  <div style=\"flex:1\"><\u002Fdiv>\n  <div style=\"padding:11px 26px; background:linear-gradient(180deg,#6d4a1a,#47300e); border:1px solid #ffb454; border-radius:4px; font:700 14px Rajdhani,sans-serif; letter-spacing:3px; color:#fbe8d8; box-shadow:0 0 24px rgba(255,180,84,.3); cursor:pointer\" onclick=\"{{ openFire }}\">OPEN FIRE ▸<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- RESOLVE strip -->\n<sc-if value=\"{{ isResolve }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"padding:14px 20px; border-top:1px solid rgba(120,180,220,.15); background:#0a1018\">\n  <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:10px\">\n    <span style=\"font:700 12px Rajdhani,sans-serif; letter-spacing:2px; color:#8ba0b8\">RESOLVE — FIRING<\u002Fspan>\n    <div style=\"padding:9px 24px; background:linear-gradient(180deg,#1a5f6d,#0e3d47); border:1px solid #4cd7ea; border-radius:4px; font:700 13px Rajdhani,sans-serif; letter-spacing:3px; color:#d8f6fb; box-shadow:0 0 20px rgba(76,215,234,.3); cursor:pointer\" onclick=\"{{ nextTurn }}\">CONTINUE ▸<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex; flex-direction:column; gap:6px; max-height:210px; overflow:auto\">\n    <sc-for list=\"{{ logLines }}\" as=\"ln\" hint-placeholder-count=\"3\">\n      <div style=\"{{ ln.rowStyle }}\">\n        <sc-if value=\"{{ ln.die }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ ln.dieStyle }}\">{{ ln.die }}<\u002Fdiv><\u002Fsc-if>\n        <div style=\"{{ ln.textStyle }}\">{{ ln.text }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:880},&quot;critTarget&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:6,&quot;min&quot;:4,&quot;max&quot;:6,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Balance&quot;,&quot;description&quot;:&quot;D6 result needed for an internal system crit (stern hits crit one easier)&quot;},&quot;enemyAcc&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.5,&quot;max&quot;:1.5,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Balance&quot;,&quot;description&quot;:&quot;Enemy accuracy multiplier&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = this.freshGame();\n  }\n\n  freshGame() {\n    return {\n      turn: 1, phase: 'move', plotStep: 'order',\n      selectedOrder: null, lockedOrder: null,\n      ghost: null, armed: null, hover: null, inspect: null,\n      log: [], banner: null,\n      ships: {\n        kestrel: {\n          id: 'kestrel', name: 'VSS KESTREL', side: 'ally',\n          x: 200, y: 430, angle: -20, w: 110, h: 44,\n          hull: 25, maxHull: 25,\n          sh: { F: 2, S: 1, A: 1 }, shMax: { F: 2, S: 1, A: 1 },\n          sys: { 'WEAPONS': 0, 'ENGINES': 0, 'SHIELD EMITTER': 0, 'BRIDGE': 0 },\n          alive: true,\n          weapons: [\n            { id: 'lance', name: 'LANCE BATTERY', arc: 'fore', range: 430, acc: 0.75, dmg: [3, 5], torp: false, charge: 0, target: null },\n            { id: 'battery', name: 'STBD BATTERY', arc: 'side', range: 320, acc: 0.60, dmg: [2, 3], torp: false, charge: 0, target: null },\n            { id: 'torpedo', name: 'MK-II TORPEDO', arc: 'fore', range: 520, acc: 0.65, dmg: [6, 8], torp: true, charge: 1, target: null }\n          ]\n        },\n        ravager: {\n          id: 'ravager', name: 'DKV RAVAGER', side: 'enemy',\n          x: 880, y: 150, angle: 165, w: 120, h: 50,\n          hull: 20, maxHull: 20,\n          sh: { F: 1, S: 1, A: 0 }, shMax: { F: 1, S: 1, A: 0 },\n          sys: { 'WEAPONS': 0, 'ENGINES': 0, 'SHIELD EMITTER': 0, 'BRIDGE': 0 },\n          alive: true, speed: 150, prefRange: 230, maxTurn: 45,\n          acc: 0.55, dmg: [2, 4], range: 380, wname: 'FLAK CANNON'\n        },\n        jackal: {\n          id: 'jackal', name: 'DKV JACKAL', side: 'enemy',\n          x: 940, y: 440, angle: 180, w: 80, h: 34,\n          hull: 12, maxHull: 12,\n          sh: { F: 1, S: 0, A: 0 }, shMax: { F: 1, S: 0, A: 0 },\n          sys: { 'WEAPONS': 0, 'ENGINES': 0, 'SHIELD EMITTER': 0, 'BRIDGE': 0 },\n          alive: true, speed: 210, prefRange: 150, maxTurn: 90,\n          acc: 0.50, dmg: [1, 2], range: 280, wname: 'AUTOGUNS'\n        }\n      }\n    };\n  }\n\n  // ---------- helpers ----------\n  critTarget() { return Math.round(this.props.critTarget ?? 6); }\n  rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }\n  norm180(a) { return ((a + 180) % 360 + 360) % 360 - 180; }\n  dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }\n  bearingFrom(ship, x, y) {\n    return this.norm180(Math.atan2(y - ship.y, x - ship.x) * 180 / Math.PI - ship.angle);\n  }\n  // final facing must stay within ±mt of BOTH the start heading and the travel course\n  clampFacing(desired, base, pos, mt, startPos) {\n    let lo = -mt, hi = mt;\n    const dx = pos.x - startPos.x, dy = pos.y - startPos.y;\n    if (Math.hypot(dx, dy) > 2) {\n      const travel = this.norm180(Math.atan2(dy, dx) * 180 / Math.PI - base);\n      lo = Math.max(lo, travel - mt);\n      hi = Math.min(hi, travel + mt);\n    }\n    const delta = Math.max(lo, Math.min(hi, this.norm180(desired - base)));\n    return base + delta;\n  }\n  arcOf(b) { const a = Math.abs(b); return a <= 50 ? 'fore' : (a >= 130 ? 'aft' : 'side'); }\n  shieldArcHit(target, ax, ay) {\n    const a = Math.abs(this.bearingFrom(target, ax, ay));\n    return a <= 60 ? 'F' : (a >= 120 ? 'A' : 'S');\n  }\n\n  orders() {\n    const engCrit = this.state.ships.kestrel.sys['ENGINES'];\n    const brgCrit = this.state.ships.kestrel.sys['BRIDGE'];\n    const mul = engCrit >= 2 ? 0.3 : (engCrit === 1 ? 0.6 : 1);\n    const all = [\n      { id: 'heading', name: 'NEW HEADING', range: 170 * mul, minMove: 40, maxTurn: 90, desc: 'move · turn ≤90°', accMod: 0, dodge: 0 },\n      { id: 'full', name: 'ALL AHEAD FULL', range: 260 * mul, minMove: 130 * mul, maxTurn: 22.5, desc: 'long move · turn ≤22.5° · −10% acc', accMod: -0.10, dodge: 0 },\n      { id: 'about', name: 'COME ABOUT', range: 90 * mul, minMove: 0, maxTurn: 180, desc: 'short move · any facing', accMod: 0, dodge: 0 },\n      { id: 'evasive', name: 'EVASIVE', range: 130 * mul, minMove: 40, maxTurn: 45, desc: 'turn ≤45° · +20% dodge · fire −15%', accMod: -0.15, dodge: 0.20 },\n      { id: 'hold', name: 'HOLD & LOCK', range: 0, minMove: 0, maxTurn: 0, desc: 'no move · +15% acc', accMod: 0.15, dodge: 0 }\n    ];\n    return brgCrit >= 1 ? all.filter(o => o.id === 'heading' || o.id === 'hold') : all;\n  }\n\n  solution(w, en) {\n    const k = this.state.ships.kestrel;\n    const d = this.dist(k, en);\n    if (d > w.range) return { ok: false, why: 'OUT OF RANGE' };\n    const arc = this.arcOf(this.bearingFrom(k, en.x, en.y));\n    if (w.arc === 'fore' && arc !== 'fore') return { ok: false, why: 'NOT IN FORE ARC' };\n    if (w.arc === 'side' && arc !== 'side') return { ok: false, why: 'NOT IN SIDE ARC' };\n    const o = this.state.lockedOrder || { accMod: 0 };\n    let pct = w.acc + o.accMod - k.sys['WEAPONS'] * 0.10 + (d > 0.7 * w.range ? -0.15 : 0);\n    pct = Math.max(0.05, Math.min(0.95, pct));\n    const sArc = this.shieldArcHit(en, k.x, k.y);\n    return { ok: true, pct: Math.round(pct * 100), dist: Math.round(d), sArc: sArc, stern: sArc === 'A' };\n  }\n\n  // ---------- interaction ----------\n  onMapClick(e) {\n    const r = e.currentTarget.getBoundingClientRect();\n    const x = e.clientX - r.left, y = e.clientY - r.top;\n    const s = this.state;\n    if (s.inspect) { this.setState({ inspect: null }); return; }\n    if (s.phase !== 'move') return;\n    const k = s.ships.kestrel;\n    if (s.plotStep === 'dest' && s.selectedOrder) {\n      const o = s.selectedOrder;\n      let d = Math.hypot(x - k.x, y - k.y) || 1;\n      let dir = Math.atan2(y - k.y, x - k.x) * 180 / Math.PI;\n      const dd = Math.max(-o.maxTurn, Math.min(o.maxTurn, this.norm180(dir - k.angle)));\n      dir = k.angle + dd;\n      d = Math.max(o.minMove, Math.min(o.range, d));\n      const rad = dir * Math.PI / 180;\n      const g = { x: k.x + Math.cos(rad) * d, y: k.y + Math.sin(rad) * d, angle: dir };\n      this.setState({ ghost: g, plotStep: 'angle' });\n    } else if (s.plotStep === 'angle') {\n      this.setState({ plotStep: 'locked' });\n    }\n  }\n\n  onMapMove(e) {\n    const s = this.state;\n    if (s.phase !== 'move' || s.plotStep !== 'angle' || !s.ghost) return;\n    const r = e.currentTarget.getBoundingClientRect();\n    const x = e.clientX - r.left, y = e.clientY - r.top;\n    const desired = Math.atan2(y - s.ghost.y, x - s.ghost.x) * 180 / Math.PI;\n    const mt = s.selectedOrder ? s.selectedOrder.maxTurn : 45;\n    const k = this.state.ships.kestrel;\n    const angle = this.clampFacing(desired, k.angle, s.ghost, mt, k);\n    this.setState({ ghost: { x: s.ghost.x, y: s.ghost.y, angle: angle } });\n  }\n\n  selectOrder(o) {\n    const k = this.state.ships.kestrel;\n    if (o.range === 0) {\n      this.setState({ selectedOrder: o, ghost: { x: k.x, y: k.y, angle: k.angle }, plotStep: 'locked' });\n    } else {\n      this.setState({ selectedOrder: o, ghost: null, plotStep: 'dest' });\n    }\n  }\n\n  lockMove() {\n    const s = this.state;\n    if (s.plotStep !== 'locked' || !s.ghost) return;\n    const ships = s.ships;\n    const oldPos = { x: ships.kestrel.x, y: ships.kestrel.y };\n    ships.kestrel.x = s.ghost.x; ships.kestrel.y = s.ghost.y; ships.kestrel.angle = s.ghost.angle;\n    ['ravager', 'jackal'].forEach(id => {\n      const en = ships[id];\n      if (!en.alive) return;\n      const spd = en.sys['ENGINES'] >= 2 ? en.speed * 0.15 : (en.sys['ENGINES'] === 1 ? en.speed * 0.5 : en.speed);\n      const mt = en.maxTurn || 60;\n      const start = { x: en.x, y: en.y };\n      // course toward the player, limited to ±maxTurn off current heading\n      const want = Math.atan2(oldPos.y - en.y, oldPos.x - en.x) * 180 / Math.PI;\n      const course = en.angle + Math.max(-mt, Math.min(mt, this.norm180(want - en.angle)));\n      const d = this.dist(en, oldPos);\n      const travel = Math.min(spd, Math.max(0, d - en.prefRange));\n      if (travel > 2) {\n        const rad = course * Math.PI / 180;\n        en.x += Math.cos(rad) * travel;\n        en.y += Math.sin(rad) * travel;\n      }\n      // final facing obeys the same rule as the player: ±maxTurn of BOTH start heading and course\n      const desired = Math.atan2(ships.kestrel.y - en.y, ships.kestrel.x - en.x) * 180 / Math.PI;\n      en.angle = this.clampFacing(desired, en.angle, en, mt, start);\n    });\n    this.setState({ phase: 'moving', lockedOrder: s.selectedOrder, ghost: null, ships: ships });\n    setTimeout(() => { if (this.state.phase === 'moving') this.setState({ phase: 'fire' }); }, 1150);\n  }\n\n  armWeapon(w) {\n    if (w.charge > 0) return;\n    if (this.state.ships.kestrel.sys['WEAPONS'] >= 2) return;\n    if (w.target) { w.target = null; this.setState({ ships: this.state.ships, armed: null }); return; }\n    this.setState({ armed: this.state.armed === w.id ? null : w.id });\n  }\n\n  shipClick(ship, e) {\n    e.stopPropagation();\n    const s = this.state;\n    if (s.phase === 'fire' && s.armed && ship.side === 'enemy') {\n      const w = s.ships.kestrel.weapons.find(x => x.id === s.armed);\n      const sol = this.solution(w, ship);\n      if (sol.ok) { w.target = ship.id; this.setState({ ships: s.ships, armed: null, hover: null }); return; }\n    }\n    this.setState({ inspect: ship.id });\n  }\n\n  // ---------- combat resolution ----------\n  applyHit(lines, attackerName, target, dmgRange, pct, opts) {\n    const roll = this.rand(1, 100);\n    if (roll > pct) {\n      lines.push({ t: attackerName + ' → ' + target.name + ' — MISS (' + pct + '% · rolled ' + roll + ')', c: '#5c7089' });\n      return;\n    }\n    const sArc = opts.sArc;\n    if (!opts.torp && sArc !== 'A' && target.sh[sArc] > 0 && target.sys['SHIELD EMITTER'] < 2) {\n      target.sh[sArc]--;\n      lines.push({ t: attackerName + ' hits ' + target.name + ' — absorbed by ' + (sArc === 'F' ? 'fore' : 'side') + ' shield', c: '#7ba8b8' });\n      return;\n    }\n    const dmg = this.rand(dmgRange[0], dmgRange[1]);\n    target.hull -= dmg;\n    lines.push({ t: attackerName + ' hits ' + target.name + (sArc === 'A' ? ' STERN' : '') + ' — ' + dmg + ' hull dmg (' + pct + '% · rolled ' + roll + ')', c: '#e8c9a0' });\n    // crit roll\n    const die = this.rand(1, 6);\n    const need = opts.stern ? this.critTarget() - 1 : this.critTarget();\n    if (die >= need) {\n      const names = Object.keys(target.sys).filter(n => target.sys[n] < 2);\n      if (names.length) {\n        const n = names[this.rand(0, names.length - 1)];\n        target.sys[n]++;\n        const lvl = target.sys[n] >= 2 ? 'DESTROYED' : 'DAMAGED';\n        lines.push({ die: die, t: 'SYSTEM HIT — ' + target.name + ' ' + n + ' ' + lvl, c: '#ff8a84', crit: true });\n      }\n    } else {\n      lines.push({ die: die, t: 'no system damage — hull absorbs the hit', c: '#5c7089', crit: false });\n    }\n    if (target.hull <= 0) {\n      target.alive = false; target.hull = 0;\n      lines.push({ t: '✸ ' + target.name + ' DESTROYED', c: target.side === 'enemy' ? '#6fe0a8' : '#ff6159', big: true });\n    }\n  }\n\n  openFire() {\n    const s = this.state;\n    if (s.phase !== 'fire') return;\n    const lines = [];\n    const k = s.ships.kestrel;\n    k.weapons.forEach(w => {\n      if (!w.target || w.charge > 0) return;\n      const en = s.ships[w.target];\n      w.target = null;\n      if (!en || !en.alive) return;\n      const sol = this.solution(w, en);\n      if (!sol.ok) { lines.push({ t: w.name + ' — no firing solution (' + sol.why + ')', c: '#5c7089' }); return; }\n      if (w.torp) w.charge = 2;\n      this.applyHit(lines, 'KESTREL ' + w.name, en, w.dmg, sol.pct, { sArc: sol.sArc, stern: sol.stern, torp: w.torp });\n nst from = centerDeg - halfDeg + 90;\n    const span = 2 * halfDeg;\n    return 'position:absolute; left:' + (x - r) + 'px; top:' + (y - r) + 'px; width:' + (2 * r) + 'px; height:' + (2 * r) + 'px; border-radius:50%; background:conic-gradient(from ' + from + 'deg, ' + color + ' 0deg ' + span + 'deg, transparent ' + span + 'deg); pointer-events:none; z-index:1';\n  }\n  sideSector(x, y, r, angleDeg, color) {\n    const from = angleDeg + 50 + 90;\n    return 'position:absolute; left:' + (x - r) + 'px; top:' + (y - r) + 'px; width:' + (2 * r) + 'px; height:' + (2 * r) + 'px; border-radius:50%; background:conic-gradient(from ' + from + 'deg, ' + color + ' 0deg 80deg, transparent 80deg 180deg, ' + color + ' 180deg 260deg, transparent 260deg); pointer-events:none; z-index:1';\n  }\n\n  // ---------- render ----------\n  renderVals() {\n    const s = this.state;\n    const k = s.ships.kestrel;\n    const pipOn = 'padding:4px 10px; border-radius:3px; border:1px solid rgba(76,215,234,.5); color:#4cd7ea; background:rgba(76,215,234,.08); box-shadow:0 0 12px rgba(76,215,234,.15)';\n    const pipFire = 'padding:4px 10px; border-radius:3px; border:1px solid rgba(255,180,84,.5); color:#ffb454; background:rgba(255,180,84,.08)';\n    const pipRes = 'padding:4px 10px; border-radius:3px; border:1px solid rgba(255,97,89,.5); color:#ff6159; background:rgba(255,97,89,.08)';\n    const pipOff = 'padding:4px 10px; border-radius:3px; border:1px solid rgba(90,110,140,.25); color:#3a4a5e';\n    const pipDone = 'padding:4px 10px; border-radius:3px; border:1px solid rgba(111,224,168,.4); color:#6fe0a8';\n    const isMove = s.phase === 'move' || s.phase === 'moving';\n    const isFire = s.phase === 'fire';\n    const isResolve = s.phase === 'resolve';\n\n    // ships + labels\n    const shipViews = [];\n    const labels = [];\n    Object.values(s.ships).forEach(sh => {\n      if (!sh.alive) return;\n      const ally = sh.side === 'ally';\n      const glow = s.armed && !ally ? '0 0 34px rgba(255,180,84,.45)' : (ally ? '0 0 26px rgba(76,215,234,.35)' : '0 0 22px rgba(255,97,89,.25)');\n      const border = ally ? 'rgba(76,215,234,.9)' : (s.armed ? '#ffb454' : 'rgba(255,97,89,.7)');\n      const bg = ally ? 'linear-gradient(105deg,#17414f,#0f2833)' : 'linear-gradient(105deg,#35181c,#22101a)';\n      shipViews.push({\n        wrapStyle: 'position:absolute; left:0; top:0; width:' + sh.w + 'px; height:' + sh.h + 'px; transform:translate(' + (sh.x - sh.w / 2) + 'px,' + (sh.y - sh.h / 2) + 'px) rotate(' + sh.angle + 'deg); transition:transform 1.1s ease; cursor:pointer; z-index:2',\n        bodyStyle: 'width:100%; height:100%; background:' + bg + '; border:1px solid ' + border + '; clip-path:polygon(0 35%, 55% 20%, 78% 0, 100% 42%, 100% 58%, 78% 100%, 55% 80%, 0 65%); box-shadow:' + glow,\n        click: (e) => this.shipClick(sh, e),\n        enter: () => { if (isFire && s.armed && sh.side === 'enemy') this.setState({ hover: sh.id }); },\n        leave: () => { if (s.hover === sh.id) this.setState({ hover: null }); }\n      });\n      labels.push({\n        style: 'position:absolute; left:' + (sh.x - 50) + 'px; top:' + (sh.y + sh.h / 2 + 8) + 'px; font:600 10px \\'IBM Plex Mono\\',monospace; color:' + (ally ? '#4cd7ea' : '#ff6159') + '; z-index:2; pointer-events:none; transition:left 1.1s ease, top 1.1s ease; white-space:nowrap',\n        text: sh.name.replace('VSS ', '').replace('DKV ', '') + ' · ' + sh.hull + '/' + sh.maxHull + ' · SHD F' + sh.sh.F + ' S' + sh.sh.S + ' A' + sh.sh.A\n      });\n    });\n\n    // firing arcs\n    const arcs = [];\n    if (s.phase === 'fire') {\n      const aw = s.armed ? k.weapons.find(x => x.id === s.armed) : null;\n      if (aw) {\n        if (aw.arc === 'fore') arcs.push({ style: this.sector(k.x, k.y, aw.range, k.angle, 50, 'rgba(255,180,84,.13)') });\n        else arcs.push({ style: this.sideSector(k.x, k.y, aw.range, k.angle, 'rgba(255,180,84,.13)') });\n      } else {\n        arcs.push({ style: this.sector(k.x, k.y, 430, k. rder-radius:2px; background:' + shCol(sh.sh.A) }\n        ],\n        nameStyle: 'font:700 15px Rajdhani,sans-serif; letter-spacing:2px; color:' + (ally ? '#4cd7ea' : '#ff6159'),\n        sub: ally ? 'YOUR SHIP · CORVETTE' : 'DOMINION ' + (sh.id === 'ravager' ? 'RAIDER' : 'ESCORT') + ' · HOSTILE',\n        hullText: sh.hull + '/' + sh.maxHull,\n        hullBar: 'width:' + Math.round(sh.hull / sh.maxHull * 100) + '%; height:100%; background:linear-gradient(90deg,' + (ally ? '#2fa8bd,#4cd7ea' : '#b23c38,#ff6159') + ')',\n        shieldsText: 'FORE ' + '▮'.repeat(sh.sh.F) + '▯'.repeat(sh.shMax.F - sh.sh.F) + ' · SIDE ' + '▮'.repeat(sh.sh.S) + '▯'.repeat(sh.shMax.S - sh.sh.S) + ' · AFT ' + '▮'.repeat(sh.sh.A) + '▯'.repeat(sh.shMax.A - sh.sh.A),\n        systems: Object.keys(sh.sys).map(n => {\n          const lvl = sh.sys[n];\n          const state = lvl === 0 ? 'OK' : (lvl === 1 ? 'DAMAGED' : 'DESTROYED');\n          const col = lvl === 0 ? '#6fe0a8' : (lvl === 1 ? '#ffb454' : '#ff6159');\n          return {\n            label: n, state: state,\n            stateStyle: 'color:' + col,\n            rowStyle: 'display:flex; justify-content:space-between; padding:6px 10px; background:' + (lvl > 0 ? 'rgba(255,97,89,.08)' : '#0d141f') + '; border:1px solid ' + (lvl > 0 ? 'rgba(255,97,89,.4)' : 'rgba(120,180,220,.15)') + '; border-radius:3px'\n          };\n        })\n      };\n    }\n\n    // order cards\n    const orderCards = this.orders().map(o => {\n      const sel = s.selectedOrder && s.selectedOrder.id === o.id;\n      return {\n        name: o.name, desc: o.desc,\n        nameStyle: 'font:700 12.5px Rajdhani,sans-serif; letter-spacing:1px; color:' + (sel ? '#d8f6fb' : '#cfdcea'),\n        style: 'width:172px; padding:9px 13px; border-radius:5px; cursor:pointer; ' + (sel ? 'background:rgba(76,215,234,.08); border:1px solid #4cd7ea; box-shadow:0 0 16px rgba(76,215,234,.2)' : 'background:#0d141f; border:1px solid rgba(120,180,220,.25)'),\n        click: () => { if (s.phase === 'move') this.selectOrder(o); }\n      };\n    });\n    const canLock = s.phase === 'move' && s.plotStep === 'locked';\n    const lockBtnStyle = 'padding:11px 26px; border-radius:4px; font:700 14px Rajdhani,sans-serif; letter-spacing:3px; cursor:pointer; ' + (canLock ? 'background:linear-gradient(180deg,#1a5f6d,#0e3d47); border:1px solid #4cd7ea; color:#d8f6fb; box-shadow:0 0 24px rgba(76,215,234,.35)' : 'background:#0d141f; border:1px solid rgba(90,110,140,.25); color:#3a4a5e');\n\n    // weapon cards\n    const weaponCards = k.weapons.map(w => {\n      const armed = s.armed === w.id;\n      const charging = w.charge > 0;\n      const offline = k.sys['WEAPONS'] >= 2;\n      let sub, subColor;\n      if (offline) { sub = 'WEAPONS DESTROYED'; subColor = '#ff6159'; }\n      else if (charging) { sub = 'charging — ' + w.charge + ' turn' + (w.charge > 1 ? 's' : ''); subColor = '#5c7089'; }\n      else if (w.target) { const sol = this.solution(w, s.ships[w.target]); sub = '→ ' + s.ships[w.target].name.replace('DKV ', '') + (sol.ok ? ' · ' + sol.pct + '%' : '') + ' · ASSIGNED (click to clear)'; subColor = '#ffb454'; }\n      else if (armed) { sub = 'ARMED — click a target'; subColor = '#ffb454'; }\n      else { sub = w.dmg[0] + '–' + w.dmg[1] + ' dmg · ' + w.arc + ' arc' + (w.torp ? ' · ignores shields' : ''); subColor = '#8ba0b8'; }\n      return {\n        name: w.name, sub: sub,\n        nameStyle: 'font:700 12.5px Rajdhani,sans-serif; letter-spacing:1px; color:' + (charging || offline ? '#5c7089' : (armed || w.target ? '#ffd9a0' : '#cfdcea')),\n        subStyle: 'font:400 9px \\'IBM Plex Mono\\',monospace; margin-top:2px; color:' + subColor,\n        style: 'width:230px; padding:9px 13px; border-radius:5px; cursor:pointer; ' + (armed || w.target ? 'background:rgba(255,180,84,.08); border:1px solid #ffb454; box-shadow:0 0 16px rgba(255,180,84,.15)' : 'background:#0d141f; border:1px solid rgba(120,180,220,.25);' + (charging || offline ? ' opacity:.65' : '')),\n        click: () => this.armWeapon(w)\n      };\n    });\n\n    // log\n    const logLines = s.log.map(ln => ({\n      die: ln.die || false,\n      dieStyle: 'width:26px; height:26px; flex:none; border:1px solid ' + (ln.crit ? '#ff6159' : 'rgba(120,180,220,.4)') + '; border-radius:4px; display:flex; align-items:center; justify-content:center; font:700 14px \\'IBM Plex Mono\\',monospace; color:' + (ln.crit ? '#ff6159' : '#8ba0b8') + (ln.crit ? '; box-shadow:0 0 12px rgba(255,97,89,.3)' : ''),\n      text: ln.t,\n      textStyle: 'font:' + (ln.big ? '600 12px' : '500 10.5px') + ' \\'IBM Plex Mono\\',monospace; color:' + ln.c,\n      rowStyle: 'display:flex; align-items:center; gap:10px;' + (ln.die ? ' padding:6px 10px; background:' + (ln.crit ? 'rgba(255,97,89,.06)' : '#0d141f') + '; border:1px solid ' + (ln.crit ? 'rgba(255,97,89,.35)' : 'rgba(120,180,220,.12)') + '; border-radius:4px' : '')\n    }));\n\n    let banner = false;\n    if (s.banner) banner = {\n      text: s.banner.win ? 'HOSTILES DESTROYED' : 'VSS KESTREL LOST',\n      style: 'font:700 40px Rajdhani,sans-serif; letter-spacing:8px; color:' + (s.banner.win ? '#6fe0a8' : '#ff6159') + '; text-shadow:0 0 40px ' + (s.banner.win ? 'rgba(111,224,168,.5)' : 'rgba(255,97,89,.5)'),\n      sub: s.banner.win ? 'Sector clear. Voss: \"Good gunnery. Log it and move on.\"' : 'Escape pods away. The Verge keeps what it takes.'\n    };\n\n    return {\n      turn: String(s.turn).padStart(2, '0'),\n      pip1: isMove ? pipOn : pipDone,\n      pip2: isFire ? pipFire : (isResolve ? pipDone : pipOff),\n      pip3: isResolve ? pipRes : pipOff,\n      isMove: isMove, isFire: isFire, isResolve: isResolve,\n      shipViews: shipViews, labels: labels,\n      arcs: arcs, ringStyle: ringStyle, pathStyle: pathStyle, ghostStyle: ghostStyle, ghostBody: ghostBody,\n      hint: hint, tip: tip, tipStyle: tipStyle,\n      ins: ins,\n      closeInspect: () => this.setState({ inspect: null }),\n      stopClick: (e) => e.stopPropagation(),\n      onMapClick: (e) => this.onMapClick(e),\n      onMapMove: (e) => this.onMapMove(e),\n      orderCards: orderCards, lockBtnStyle: lockBtnStyle,\n      lockMove: () => this.lockMove(),\n      weaponCards: weaponCards,\n      openFire: () => this.openFire(),\n      logLines: logLines,\n      nextTurn: () => this.nextTurn(),\n      banner: banner,\n      restart: () => this.restart()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
